# Config for 2-D Navier-Stokes (vorticity) benchmark

problem: navier_stokes
n_samples: 200
h: 64
w: 64
T_in: 10
train_ratio: 0.8
batch_size: 8
num_workers: 0

# Model
modes: 12
modes2: 12
width: 32
n_layers: 4

# Training
n_epochs: 50
lr: 1.0e-3
weight_decay: 1.0e-4
seed: 42
checkpoint_dir: checkpoints/navier_stokes
