optional_extensions:
  notes: >
    If copper directionality matters, replace scalar layer properties with spatial maps
    such as eq_exx_gpa_map, eq_eyy_gpa_map, eq_alphaxx_ppm_per_C_map, and
    eq_alphayy_ppm_per_C_map for each layer.
  additional_fields:
    - via_density_map
    - eq_exx_gpa_map
    - eq_eyy_gpa_map
    - eq_alphaxx_ppm_per_C_map
    - eq_alphayy_ppm_per_C_map